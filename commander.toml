[project]
name = "commander"

[runtime]
provider = "anthropic"
default_model = "claude-sonnet-4-6"
max_output_tokens = 16384

[supervisor]
max_agents = 5
tick_interval_ms = 2000
nudge_after_ms = 120000
restart_after_ms = 300000
max_restarts = 2

[validation]
# test_command = "cargo test"
max_fix_cycles = 3
